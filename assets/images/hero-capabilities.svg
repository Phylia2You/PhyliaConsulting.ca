<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" role="img" aria-labelledby="title desc">
  <title id="title">Connected business technology workspace</title>
  <desc id="desc">A refined digital workspace brings a professional website, organized inquiries, reliable connectivity, and ongoing support into one coordinated view.</desc>
  <defs>
    <linearGradient id="frame" x1="90" y1="70" x2="720" y2="590" gradientUnits="userSpaceOnUse"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#f4f8ff"/></linearGradient>
    <linearGradient id="screen" x1="122" y1="175" x2="456" y2="350" gradientUnits="userSpaceOnUse"><stop stop-color="#eaf5ff"/><stop offset="1" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0b2341" flood-opacity=".15"/></filter>
    <clipPath id="frameClip"><rect x="62" y="48" width="676" height="548" rx="30"/></clipPath>
  </defs>

  <g filter="url(#shadow)">
