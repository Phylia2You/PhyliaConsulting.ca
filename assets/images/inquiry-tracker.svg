<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">Inquiry tracker illustration</title><desc id="desc">Kanban style tracker for leads and follow ups</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0fddcf"/><stop offset=".55" stop-color="#3b82f6"/><stop offset="1" stop-color="#1e2a78"/></linearGradient>
  <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff" stop-opacity=".96"/><stop offset="1" stop-color="#dffbff" stop-opacity=".86"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#072b4f" flood-opacity=".28"/></filter>
</defs>
<rect width="1200" height="800" rx="44" fill="url(#bg)"/>
<circle cx="1040" cy="120" r="190" fill="#ffffff" opacity=".12"/>
<circle cx="160" cy="680" r="240" fill="#35f1df" opacity=".13"/>
